name: ETL Pipeline

on:
  schedule:
    - cron: '0 */4 * * *'  # Run every 4 hours
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  issues: write  # Add permission to create issues

jobs:
  run-etl:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Check secrets
        run: |
          # Check if all required secrets are present
          if [ -z "${{ secrets.FRED_API_KEY }}" ]; then
            echo "Warning: FRED_API_KEY is not set"
          fi
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "Warning: SUPABASE_URL is not set"
          fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then
            echo "Warning: SUPABASE_KEY is not set"
          fi
          if [ -z "${{ secrets.GOOGLE_SHEET_NAME }}" ]; then
            echo "Warning: GOOGLE_SHEET_NAME is not set"
          fi
          if [ -z "${{ secrets.GOOGLE_SHEET_WORKSHEET }}" ]; then
            echo "Warning: GOOGLE_SHEET_WORKSHEET is not set"
          fi
          if [ -z "${{ secrets.GOOGLE_CREDENTIALS }}" ]; then
            echo "Warning: GOOGLE_CREDENTIALS is not set"
          fi
          
      - name: Run ETL pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_SHEET_WORKSHEET: ${{ secrets.GOOGLE_SHEET_WORKSHEET }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python pipeline.py
        
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'ETL Pipeline Failed',
                body: 'The ETL pipeline failed. Please check the workflow run for details.',
                labels: ['bug', 'etl']
              });
            } catch (error) {
              console.error('Failed to create issue:', error);
              // Don't fail the workflow if issue creation fails
            }